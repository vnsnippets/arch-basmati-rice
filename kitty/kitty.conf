font_family                       Noto Sans Nerd Font
font_size                         12

enable_audio_bell                 no
shell                             zsh
shell_integration                 disabled

cursor_shape                      block
cursor_blink_interval             0

url_style                         curly

remember_window_size              no

window_padding_width              16

background_opacity                0.85

scrollbar_handle_opacity          0
scrollbar_track_opacity           0
scrollbar_track_hover_opacity     0

confirm_os_window_close           0

# This tells Kitty to stop clearing the screen and just send the key signal
map ctrl+shift+delete             no_op
map ctrl+shift+backspace          no_op

include theme.conf
