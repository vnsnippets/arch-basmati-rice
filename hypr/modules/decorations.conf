# See https://wiki.hypr.land/Configuring/Variables/#general
general:gaps_in = 5
general:gaps_out = 10

general:border_size = 1
general:resize_on_border = 1

general:col.active_border = $active_border
general:col.inactive_border = $inactive_border
general:allow_tearing = false

general:layout = dwindle
dwindle:smart_split = 0

# See https://wiki.hypr.land/Configuring/Variables/#decoration
decoration:rounding = 12
decoration:rounding_power = 2.0

decoration:active_opacity = 0.8
decoration:inactive_opacity = 0.8

decoration:shadow:enabled = 0

# decoration:blur:enabled = true
# decoration:blur:contrast = 0.9
# decoration:blur:noise = 0.015
# decoration:blur:passes = 2
# decoration:blur:size = 6
# decoration:blur:brightness = 0.8
# decoration:blur:vibrancy = 0.15
# decoration:blur:new_optimizations = true

# Frosted Glass Effect
decoration:blur:enabled = true
decoration:blur:size = 12            # The "radius" of the blur
decoration:blur:passes = 4           # How many times the blur is processed (higher = smoother)

decoration:blur:vibrancy = 0.1696    # Boosts colors for a more vivid glass look
decoration:blur:noise = 0.0117       # Adds a tiny bit of grain to mimic real glass texture
decoration:blur:contrast = 0.8916    # Keeps the text readable against the background
decoration:blur:brightness = 0.8172  # Adjusts the "opacity" feel of the light
        
decoration:blur:new_optimizations = true
decoration:blur:xray = true          # Allows the blur to see through other floating windows

decoration:dim_strength = 0.15

# See https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,             X0,    Y0,    X1,    Y1
    bezier = easeOutQuint,     0.23,  1,     0.32,  1
    bezier = easeInOutCubic,   0.65,  0.05,  0.36,  1
    bezier = linear,           0,     0,     1,     1
    bezier = almostLinear,     0.5,   0.5,   0.75,  1
    bezier = quick,            0.15,  0,     0.1,   1

    # Custom curves
    #        NAME,             X0,    Y0,    X1,    Y1
    bezier = saneAspect,       0.05,  0.9,   0.1,   1.05
    bezier = smooth,           0.4,   0,     0.2,   1
    bezier = elasticOut,       0.68, -0.55,  0.265, 1.55
    bezier = almostElasticOut, 0.05, -0.2,   0.265, 1.2

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,           [STYLE]
    animation = global,        1,     10,    default

    animation = border,        1,     5.39,  easeOutQuint
    animation = border,        1,     10,    saneAspect
    animation = borderangle,   1,     10,    default

    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint,    popin 87%
    animation = windowsOut,    1,     1.49,  linear,          popin 87%
    # animation = windows,       1,     7,     saneAspect
    # animation = windowsIn,     1,     7,     saneAspect,        slide
    # animation = windowsOut,    1,     7,     saneAspect,        slide

    # animation = fade,          1,     3.03,  quick
    animation = fade,          1,     7,     default
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear

    # animation = layers,        1,     3.81,  easeOutQuint
    # animation = layersIn,      1,     4,     easeOutQuint,    fade
    # animation = layersOut,     1,     1.5,   linear,          fade

    # animation = fadeLayersIn,  1,     1.79,  almostLinear
    # animation = fadeLayersOut, 1,     1.39,  almostLinear

    # animation = workspaces,    1,     1.94,  almostLinear,    fade
    # animation = workspacesIn,  1,     1.21,  almostLinear,    fade
    # animation = workspacesOut, 1,     1.94,  almostLinear,    fade
    animation = workspaces,    1,     8,    elasticOut,      slide fadeDelta

    animation = zoomFactor,    1,     7,     quick
}

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}
