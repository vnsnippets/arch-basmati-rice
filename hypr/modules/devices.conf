# See https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
# Format: gesture = fingers, direction, action, [options]
# gesture = 3, horizontal, workspace

# 3-finger horizontal swipe for workspaces
# 'scale' replaces 'workspace_swipe_distance' (higher = more distance needed)
# 'cancel_ratio' is the percentage of swipe before it commits (0.25 = 25%)
# gesture = 3, horizontal, workspace, cancel_ratio:0.15, scale:0.4
gesture = 3, pinchin, fullscreen

cursor:hide_on_tablet = 1
cursor:inactive_timeout = 0
cursor:no_hardware_cursors = true
input:follow_mouse = 2
input:sensitivity = 0.25
input:touchpad:natural_scroll = 1
